# Render Blueprint — leaderboard API + PostgreSQL
# Repo root: 95_DashGame3_Main — use Blueprint path: game3-dash/render.yaml
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy, set FRONTEND_ORIGIN to your Vercel URL in the Render dashboard.

databases:
  - name: game3-dash-db
    databaseName: game3_dash
    user: game3_dash
    plan: free

services:
  - type: web
    name: game3-dash-api
    runtime: node
    rootDir: game3-dash/backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: game3-dash-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false
